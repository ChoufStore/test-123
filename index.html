<!DOCTYPE html>
<html>
<head><title>test-123</title><style>body{font-family:Arial;text-align:center;padding:50px;background:#c17b4c;color:white;}</style></head>
<body><h1>🇲🇦 test-123</h1><div id="products"></div>
<script>
fetch('https://firestore.googleapis.com/v1/projects/choufstore-1a66b/databases/(default)/documents/stores/test-123/products')
    .then(r => r.json()).then(data => {
        let html = '';
        data.documents?.forEach(doc => {
            const f = doc.fields;
            html += `<div>${f.icon?.stringValue || '📦'} ${f.name.stringValue} - ${f.price.integerValue} MAD</div>`;
        });
        document.getElementById('products').innerHTML = html || '<p>No products</p>';
    });
</script>
</body>
</html>
